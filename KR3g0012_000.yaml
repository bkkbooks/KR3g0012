body:
  text: 提要洪範皇極內篇術數類一數學之屬臣等謹案洪範皇極內篇五卷宋蔡沈撰沈父元定究心洪範之數未及論著嘗曰成吾書者沈也沈反覆數十年然後成書分外篇而釋數之辭尚未備故各條之下有但標數曰二字而無其文者永樂大典及性理大全皆作洪範內篇惟熊宗立注本以論三篇為內篇數八十一章為外篇考是書數八十一章擬易六十四卦當為內篇論三篇擬易繫辭說卦等傳當為外篇今各本皆以論三篇列於前而八十一章列於後倫序頗為不協疑性理大全與永樂大典同時纂輯所據同一誤本未及詳考歟明俞深著洪範疇解曹溶稱為釋蔡氏內篇疇即八十一章之數也程宗舜作洪範內篇釋其自序曰釋八十一章之數亦不指三篇之論韓邦竒引論中象以偶為用數語作洪範𫝊以别於經即外篇矣意其時必有流𫝊善本與永樂間書局所據不同故諸家之言如此其訛似無可疑然俞深等所據之本今不復見未敢輕改古書姑仍其舊第編之又考王應麟玉海載此書名洪範數王圻續通考作洪範皇極內外篇朱彛尊經義考作洪範內外篇今詳考其書當以續通考所名為是續通考不載卷數經義考作七卷今以類相從編為五卷考洛書之名見於易不見於書洪範之文以明理非以明數其事絶不相謀後人以乾鑿太一行九宫法指為洛書案史記日者列𫝊所載占日七家太乙家居其一漢書載太乙諸術亦列於五行家明為方技之說事不出於經義矣盧辨注大戴禮記明堂篇始附合於龜文按盧辨北齊人其說最為晚出朱子引此注以證龜書指為鄭康成撰朱𫝊及羣書豈不知康成未注大戴禮記特欲申龜文之說别無古證是不得不移之鄭康成耳至宋而圗書之說大興遂以為洪範確屬洛書洛書確屬龜文龜文確為戴九履一等九數而聖人叙彛倫之書變為術家談竒偶之書矣沈作是書附㑹劉歆河圖洛書相為表裏八卦九章相為經緯之說借書之文以擬易之貌以九九演為八十一疇仿易卦八八變六十四之例也取月令節氣分配八十一疇陰用孟喜解易卦氣值日之術也其揲蓍以三為綱積數為六千五百六十一隂用焦贛六十四卦各變六十四卦之法也大意以太元元包潛虛既已擬易不足以見新竒技變幻其說歸之洪範實則朝三暮四朝四暮三同一僭經而已矣此在術數之家已為重儓之重儓本不足道以自沈以後又開演範之一派支離轇轕踵而為之者頗多既有其末不可不著其本故録而存之而别録於術數類明非說經之正軌儒者之本務也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀洪範皇極內篇原序體天地之撰者易之象紀天地之撰者範之數按熊宗立洪範九疇數本之數下多序者書之題辭也體天地造化之樞而作者伏羲得河圖而畫卦以成易之象也紀天地造化之機而作者大禹得洛書而叙疇以成範之數也二十五字似後人誤增今去之數者始於一象者成於二一者竒二者偶也竒者數之所以行偶者象之所以立故二四而八案性理大全作二而四四而八八者八卦之象也三三而九案性理大全作一而三三而九九者九疇之數也由是重之八八而六十四六十四而四千九十六而象備矣九九而八十一八十一而六千五百六十一而數周矣易更四聖而象已著範錫神禹而數不傳後之作者昧象數之原窒變通之妙或積象以為數或反數而擬象洞極有書濳虛有圖非無作也而牽合傅㑹自然之數益晦蝕焉嗟夫天地之所以肇人物之所以生萬事案原本作物謹據九疇數解校改之所以得失者亦數也數之體著於形數之用妙於理非窮神知化獨立物表者曷足以與於此哉然數之與象若異用也而本則一若殊途也而歸則同不明乎數不足以語象不明乎象何足以知數二者可以相有而不可以相無也有如是乎先君子曰洛書案原本下有與大衍詳說五字性理大全無之考大衍詳說乃蔡元定自著書名見宋史本傳原本疑誤謹校改者數之原也豫讀洪範而有感焉上稽天文下察地理中參人事古今之變窮義理之精微究興亡之徴兆微顯闡幽彞倫攸敘秩然有天地萬物各得其所之妙嵗月浸久粗述所見辭雖未備而義則著矣其果有益於世教否乎皆所不敢知也然豫所樂而玩者理也所言而傳者數也若其所以數之妙則在乎人之自得焉耳蔡沈序
