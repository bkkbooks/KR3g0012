body:
  text: 洪範皇極内篇卷一宋蔡沈撰皇極内篇上造化之為造化者幽眀屈信而已天者眀而信者也地者幽而屈者也暑者眀而信者也寒者幽而屈者也晝者眀而信者也夜者幽而屈者也天地也寒暑也晝夜也幽眀屈信以成變化者也是故陽者吐氣陰者含氣吐氣者施含氣者化陽施隂化而人道立矣萬物繁矣陽薄陰則繞而為風陰囚陽則奮而為雷陽和隂則為雨為露陰和陽則為霜為雪陰陽不和則為戾氣沖漠無朕萬象具矣動靜無端後則先矣器根於道道著器矣一實萬分萬復一矣混兮闢兮其無窮矣是故數者計乎此者也疇者等乎此者也行者運乎此者也微而顯費而幽神應不測所以妙乎此者也有理斯有氣有氣斯有形形生氣化而生生之理無窮焉天地絪緼萬物化醇男女搆精萬物化生化生者塞化醇者賾覆土之陵積水之澤草木魚蟲孰形孰色無極之真二五之精妙合而凝化化生生莫測其神莫知其能理之所始數之所起微乎㣲乎其小無形昭乎昭乎其大無垠㣲者昭之原小者大之根有先有後孰離孰分成性存存道義之門老氏為虚釋氏為無刑名失實陰陽多拘異端曲學烏乎不渝哉有理斯有氣氣著而理隱有氣斯有形形著而氣隱人知形之數而不知氣之數人知氣之數而不知理之數知理之數則㡬矣動靜可求其端隂陽可求其始天地可求其初萬物可求其紀鬼神知其所幽禮樂知其所著生知所来死知所去易曰窮神知化德之盛也智者君子所以成德之終始也是故欲知道不可以不知仁欲知仁不可以不知義欲知義不可以不知禮欲知禮不可以不知數數者禮之序也分於至㣲等於至著聖人之道知序則㡬矣人非無知也而真知為難人非無見也而真見為難義之質人所知也而犯義者多禮之文人所見也而越禮者衆以其知之非真知見之非真見爾真者精之極精則眀眀則誠誠則為其所為不為其所不為如水之寒火之熱亦性之而已矣物窒而理虚暗窒而眀虚萬物生於虚眀而死於窒暗也萬事善於虚眀而惡於窒暗也虚眀則神神則聖聖者數之通也窒暗則惑惑則愚愚者數之塞也隂陽五行其體而用用而體者耶渾渾淪淪而出入異門繩繩井井而形色俱冺合之而知其異析之而知其同㣲之而知其顯充之而知其不可窮者其庶矣哉隂陽相為首尾者耶是故陽順而隂逆陽長而隂消陽進而隂退順者吉而逆者凶耶長者盛而消者衰耶進者利而退者鈍耶周流不窮道之體也失得相形事之紀也隂陽非可一言盡也以清濁言則清陽而濁隂以動靜言則動陽而靜隂以升䧏言則升陽而降隂以竒偶言則竒陽而偶隂小大髙卑左右後先向背進退逆順醜妍靡物不爾無時不然愈析愈㣲愈窮愈延隂陽之精互藏其營隂陽之氣循環迭至隂陽之質縱横曲直莫或使之莫或禦之變者化之漸化者變之成變化者隂陽之消長屈伸也非二則不能久非一則不能神昔者天錫禹洪範九疇也初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極無形者理也有形者物也隂陽五行其物也歟所以隂陽五行其理也歟無形之中而具有形之實有形之實而體無形之妙故君子語上而不墮於虚無語下而不泥於形器中立而不倚旁行而不流樂天知命而不憂形氣之元極實先焉極無不中也氣或偏矣形又偏矣中無不善偏不善矣氣之善者十之五形之善者十之三三五之中又有至焉有不至焉純乎極者一而已矣漸偏則漸駁氣使然也形使然也氣有方形有體故中者少而偏者多也此天下善惡之所由出失得之所由分吉凶禍福之所由著歟理其至妙矣乎氣之未形物之未生理無不具焉氣之既形物之既生理無不在焉渾然一體而不見其有餘物各賦命而不見其不足無形影可度也無聲臭可聞也主萬化妙萬物人知其神而不知其所以神邵子曰性者道之形體也道妙而無形性則仁義禮智具而體著矣程子曰天運而不已日往則月來寒往則暑來水流而不息物生而不窮皆與道為體者也非性無以見道非不息亦無以見道是以君子盡性而自强不息焉朱子曰太極者本然之妙也動靜者所乗之機也太極形而上之道也隂陽形而下之器也自形而下者觀之則動靜不同時隂陽不同位而太極無不在焉自形而上者觀之則冲漠無朕而動靜隂陽之理已悉具於其中矣雖然推之於前而不見其始之合引之於後而不見其終之離也程子曰動静無端隂陽無始非知道者孰能識之張子曰鬼神者二氣之良能也神者氣之伸陽之動也鬼者氣之屈隂之静也靜不能以不動動則萬物之所從生動不能以不靜靜則萬物之所由復一往一復其機葢有不能自已者焉非一則不能成兩非兩則不能致一兩者可知而一者難知也兩者可見而一者難見也可知可見者體乎難知難見者微乎仁義禮智信者義理之公也人之所固有視聽言貌思者形氣之私也我之所自生公者千萬人之所同私者一人之所獨是以君子貴同而賤獨極建則大本立極眀則大用著以之齊家而家無不齊以之治國而國無不治以之平天下而天下無不平若是者天地其合鬼神其依龜筮其從立百世之下等百世之上而莫能違也立百世之上俟百世之下而亦莫能違也天地之位也四時之運也隂陽感而五行播矣五行隂陽也隂陽五行也數始𡨕𡨕妙於無形非體非用非静非動動實其機用因以隨動極而静清濁體正天施地生品彚咸亨各正性命小大以定斯數之令既眀而神是曰聖人人心至靈也虚眀之頃事物之來是是非非無不眀也少則昏矣久則怠矣又久則棄之矣無他形氣之私溺之也人能超乎形氣㧞乎物欲逹其初心則天下之理得矣天下之理動者竒而静者偶行者竒而止者偶得友者致一而生物者不二也數者彛倫之序也無叙則彛倫斁矣其如禮樂何哉人心動静性情具焉性者理之形體情者性之發動善其本然惡其過不及也存心莫善於敬進學莫善於知二者不可廢一也人之一心實為身主其體則有仁義禮智之性其用則有惻隱羞惡辭讓是非之情方其寂也渾然在中無所偏倚與天地同體雖鬼神不能窺其幽及其感也隨觸隨應範圍造化曲成萬物雖天地不得與其能天地之大人猶有憾故君子語大天下莫能載焉語小天下莫能破焉至小無内至大無外無内不可分也孰分之歟無外不可窮也孰窮之歟思之思之式顯其微度之度之莫或其遺匪神之為而妙於斯程子曰天地之常以其心普萬物而無心聖人之常以其情順萬事而無情常之時義大矣哉禮義交際其萬化所入之門耶東北萬物之所出也出則育神西南萬物之所入也入則復命其出也順而生其入也拂而遂不觀其出無以知物之育不觀其入無以知物之復火之克金水之生木出入循環生克嗣續老彭得之以養身君子得之以養民聖人得之而天下和平周子曰厥彰厥微匪靈弗瑩剛善剛惡柔亦如之中焉止矣二氣五行化生萬物五殊二實二本則一一實萬分萬一各正小大有定眀理而後可與適道守理而後可與治民逹理而後可與言數非理之道老佛之道也非理之治荒唐之説也非理之數京房郭璞之技也君子所不由不為不言也至一而精至虚而靈有動有靜動直靜凝靜已而動動已而靜為屈為伸為鬼為神人心至妙萬化之窌動靜之徼天地之化不翕聚則不能發散仁智交際萬化之機軸也氣之消息也以漸氣之息也形之生也氣之消也形之毁也潤萬物者莫澤乎水化萬物者莫疾於火水火者未離乎氣者也數運無形而著有形智者一之愚者二焉數之方生化育流行數之已定物正性命圎行方止為物終始隨之而無其端也迎之而無其原也渾之惟一析之無極惟其無極是以惟一二氣之初理妙於無無極而太極也五運迭至理藏於智或為之先大本其原或為之後復往之間大本太始復往無已二者不同一而已矣二氣之神隂精陽明消息變化有立有行立則形具行則氣著上下其儀先後其施一行一立為闢為翕何千萬年無終窮焉
