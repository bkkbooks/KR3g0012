body:
  text: 洪範皇極內篇卷二宋蔡沈撰皇極內篇中河圖體圓而用方聖人以之而畫卦洛書體方而用圓聖人以之而敘疇卦者陰陽之象也疇者五行之數也象非耦不立數非竒不行竒耦之分象數之始也是故以數為象則竒零而無用太元是也以象為數則多耦而難通經世書是也陰陽五行固非二體八卦九疇亦非二致理一用殊非深於造化者孰能識之河圖非無竒也而用則存乎耦洛書非無耦也而用則存乎竒耦者陰陽之對待乎竒者五行之迭運乎對待者不能孤迭運者不可窮天地之形四時之成人物之生萬化之凝其妙矣乎象以耦為用者也有應則吉數以竒為用者也有對則凶上下相應之位也陰陽相求之理也中五特立而當時者獨盛也是故天地定位山澤通氣木盛而金衰水寒而火囚理有相需而物不兩大也數者動而之乎靜者也象者靜而之乎動者也動者用之所以行靜者體之所以立清濁未判用實先焉天地已位體斯立焉用既為體體復為用體用相仍此天地萬物所以生化而無窮也流行者其陽乎成性者其陰乎陽者數之生也陰者象之成也陽以三至陰以倍乘生生不窮者以序升自然而然有不容已非智與仁曷究終始言天下之靜者存乎正言天下之動者存乎時正者道之常也時者因之綱也是故君子立正以俟時數者所以順性命之理也一為水而腎其德智也二為火而心其德禮也三為木而肝其德仁也四為金而肺其德義也五為土而脾其德信也一者九之祖也九者八十一之宗也圓之而天方之而地行之而四時天所以覆物也地所以載物也四時所以成物也散之無外卷之無內體諸造化而不可遺者乎一數之周一嵗之運也九數之重八節之分也一一陽之始也五五陰之萌也三三陽之中也七七陰之中也二二者陽之長四四者陽之壯五則陽極矣六六者陰之長八八者陰之壯九則陰極矣一九首尾為一者一嵗首尾於冬至也蓋冬至二而餘則一也一者數之始也九者數之終也一者不變而九者盡變也三五七者變而少者也二四六八者變而耦者也變之耦者不能以及乎竒變之少者不能以該乎物竒耦相參多寡相涵其惟九數乎順數則知物之始逆數則知物之終數與物非二體也始與終非二致也大而天地小而毫末明而禮樂幽而鬼神知數即知物也知始即知終也數與物無窮其誰始而誰終數始於一參於三究於九成於八十一備於六千五百六十一八十一者數之小成也六千五百六十一者數之大成也天地之變化人事之始終古今之因革莫不於是著焉是故一九而九九九而八十一八十一而七百二十九二九十八十八而百六十二百六十二而一千四百五十八三九二十七二十七而二百四十三二百四十三而二千一百八十七四九三十六三十六而三百二十四三百二十四而二千九百一十六五九四十五四十五而四百有五四百有五而三千六百四十五六九五十四五十四而四百八十六四百八十六而四千三百七十四七九六十三六十三而五百六十七五百六十七而五千一百有三八九七十二七十二而六百四十八六百四十八而五千八百三十二九九八十一八十一而七百二十九七百二十九而六千五百六十一列而次之自一而九自九而一一逆一順一九二八三七四六互相變通五則常中有吉有凶摺亡而福隆案此摺字未詳疑誤君子之所為害案此害字疑誤以韻讀之當是崇字是故一變始之始二變始之中三變始之終四變中之始五變中之中六變中之終七變終之始八變終之中九變終之終數以事立亦以事終酬酢無常與時偕通中者天下之大本乎自一而九自九而一雖歷萬變而五常中焉洛書數九而用十何也十者數之成也數成而五行備也數非九不生非十不成九以通之十以節之九以行之十以止之九者變通之機十者五行之敘方隅對待中五含五而十數已具於九數之中矣以見其體用之不相離而圖書所以相為經緯也九者生數也十者成數也生者方發而未形成者已具而有體未形而有形者變化見也有體而無體者其用藏也是故雨以潤之暘以熯之寒以斂之燠以散之風以動之其生物也不測其成物也不忒生居物先成居物後故能為竒故能為耦天下之數九而究矣十者一之變也百者十之變也千者百之變也萬者千之變也十百千萬皆一也先子曰天數中於五地數中於六天有陰陽故二其五為一十合三與七一與九亦十也地有柔剛故二其六為十二合四與八二與十亦十二也十為干十二為支十千者五行有陰陽也十二支者六氣有柔剛也十干實五行也十二支實六氣也五行六氣實一氣也清濁未判乃天地之所以立上下定位又萬物之所以生故自體言之則對待而不可闕自用言之則往來而不可窮蓋造化之幾微聖人之能事也物有其則數者盡天下之物則也事有其理數者盡天下之事理也得乎數則物之則事之理無不在焉不眀乎數不眀乎善也不誠乎數不誠乎身也故靜則察乎數之常而天下之故無不通動則達乎數之變而天下之幾無不獲正數者天地之正氣也其吉凶也確間數者天地之間氣也其吉凶也雜其進退消長之道歟數由人興數由人成萬物皆備於我咸自取之也中人以上逹於數者也中人以下囿於數者也聖人因理以著數天下因數以明理然則數者聖人所以教天下後世者也國家將興必有禎祥國家將亡必有妖孽善必先知之不善必先知之因天下之疑定天下之志去惡而就善舍凶而趨吉謁焉而無不告也求焉而無不獲也利民而不費濟世而不窮神化而不測數之用其大矣哉禮儀三百威儀三千皆天道之流行也箕子曰皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極鍚汝保極凡厥庶民無有淫朋人無有比德惟皇作極無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極上焉者安於數者也其次守焉其下悖焉安焉者謂之聖守焉者謂之賢悖之者愚而已矣是故歷數在躬不思而得不勉而中聖人也體數之常不易其方順時而行賢人也逆數越理亂天之紀小人之無忌憚也義之所當為而不為者非數之所能知也義之所不當為而為者亦非數之所能知也非義不占非疑不占非疑而占謂之侮非義而占謂之欺虛其心和其志平其氣一其聼有不占也而事無不應有不謀也而用無不成誠之至焉神亦至焉是謂動之以天敬者聖學始終之要未知則敬以知之已知則敬以行之不敬則心無管攝顛倒眩瞀安能有所知有所行乎義利不可不明也不明則以利為義心雖公亦私耳天下正理若大路然一而已旁蹊曲徑皆私意也故曰遵王之道無有黨偏偏陂反側云命之流行而不已者道也道於天其陽乎道於地其陰乎道於人其仁義乎人者兼天地而參之者也是故天覆地承非聖人不形天施地生非聖人不成天神地靈非聖人而誰為貞父子有親君臣有義夫婦有别長幼有序朋友有信五品遜而太和合皇極之世也堯舜父子之衰也湯武君臣之缺也伏羲神農日之中乎堯舜三代時之中乎五行在天則為五氣雨暘燠寒風也在地則為五質水火木金土也天之五氣雨暘質也地之五質水火氣也天交於地而雨暘為質地交於天而水火為氣二變而三不變者二得陰陽之正而三得陰陽之雜也故二能變而三不能變也五行二氣之分也二氣交感絪縕雜揉開閣動蕩相生則水木火土金相克則水火金木土出眀入幽千變萬化四時之運生克著焉自陰而陽也順自陽而陰也逆木之盛也水實生之金之成也火實制之水之潤下火之炎上木之曲直其德以順而成金之從革其德因制而盛自然之理也順而生者易知逆而克者難見曰伏焉歷書曰庚伏曰伐焉律書曰罰伐土居其中因時致旺四序成功而無名稱焉其德至矣夫月今增置土行雖曰中央土然繫於夏月之後是以土生於火矣三季皆一行而夏之三月獨二行也近代以一朞之日而五分之行各七十有二日以辰戌丑未為土寄旺之月之方似矣然猶未免刻舟之固是豈足語造化之微也哉善養生者以氣而理形以理而理氣理順則氣和氣和則形和形和則天地萬物無不和矣不善養生者反是理昏於氣氣梏於形耳目口鼻狥而私欲勝好惡哀樂淫而天理亡其能茍生者禽獸而已矣耳目口鼻手足之用皆五也或曰支指五矣耳目口鼻何有焉曰耳聽五聲目辨五色口嘗五味鼻别五臭不具於此何有於彼手足以形用耳目口鼻以神用形用者易知而神用者難識矣原者氣之始也冲者形之始也中者治之極也用者物之窒也終者事之畢也原者仁之先也用者義之端也公者禮之間也戎者智之刓也中者信之完也原者近乎中也伏者遠乎中也近者進而逺者退也近者息而遠者消也原始反終故知死生之說也原元吉幾君子有終數曰原誠之源也幾繼而善也君子見幾有終吉也潜勿用有攸往正靜吉數曰潜藏也勿用有攸往陽微也正靜吉正而靜所以吉也君子藏器於身待時而動故無不利也原之一一曰君子見幾不俟終日數曰知至至之可與幾也中之五五曰㑹其有極歸其有極數曰各正性命保合太和也終之九九曰君子令終萬福攸降數曰知終終之可與存義也原之一一者繼之善也原之九九者逆而凶也當時者盛失時者窮也厥相休囚以類從也君子時之為貴時止時行時晦時眀萬夫之望數終而復乎一其生生而不窮者也陰之終陽之始也夜之終晝之始也嵗之終春之始也萬物之終萬物之始也是故入乎幽者所以出乎眀極乎靜者所以根乎動前天地之終其後天地之始乎一者以乘數終而言九九八十一也八十一其八十一而六千五百六十一也六千五百六十一其六千五百六十一而四千三百有四萬六千七百二十一也餘倣此一者數之原也九者數之究也十者行之陰陽也十二者氣之柔剛也原其所始究其所終陰陽柔剛分合錯綜粲然于天地之間矣皇極內篇下溟漠之間兆朕之先數之原也有儀有象判一而兩數之分也日月星辰垂於上山嶽川澤奠于下數之著也四時迭運而不窮五氣以序而流通風雷不測雨露之澤萬物形色數之化也聖人繼世經天緯地立茲人極稱物平施父子以親君臣以義夫婦以别長幼以序朋友以信數之教也分天為九野中央曰鈞天其星曰北極上規七十二度東方曰蒼天其星亢氐房心尾東北曰旻天其星箕斗北方曰元天其星牛女虗危室西北曰幽天其星壁奎婁西方曰昊天其星胃昴畢西南曰朱天其星觜參井南方曰炎天其星鬼桞星張翼東南曰陽天其星翼軫角皆四十有五度半强别地為九州東南曰揚州其山鎮曰會稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻河南曰豫州其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種正東曰青州其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沭其利蒲魚其民二男二女其畜宜雞狗其榖宜稻麥河東曰兖州其山鎮曰岱山其澤藪曰大野其川河泲其浸盧維其利蒲魚其民二男三女其畜宜六擾其穀宜四種正西曰雍州其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜宜牛馬其榖宜黍稷東北曰幽州其山鎮曰醫無閭其澤藪曰貕養其川河泲其浸菑時其利魚鹽其民一男三女其畜宜四擾其榖宜三種河內曰冀州其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾潞其利松柏其民五男三女其畜宜牛羊其榖宜黍稷正北曰并州其山鎮曰恆山其澤藪曰昭餘祁其川呼池嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其榖宜五種制人為九行臯陶謨曰亦行有九德亦言其人有德寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而廉剛而塞彊而義彰厥有常吉哉日宣三德夙夜浚明有家日嚴祗敬六德亮采有邦翕受敷施九德咸事九品任官正一品從正二品從正三品從正四品從正五品從正六品從正七品從正八品從正九品從從並同外官各降一等內外文武官自一品以下並給職田京官諸司及郡縣又給公廨田並有差九井均田經土地而井牧其田野九夫為井四井為邑四邑為邱四邱為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事九族睦俗九族髙祖至元孫之親舉近以該逺五服之外異姓之親亦在其中也九禮辨分冠婚喪祭朝宗軍賔學九變成樂凡樂圜鍾為宫黃鍾為角太簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫太簇為角姑洗為徵南呂為羽靈鼓靈鼗絲竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地祗皆出可得而禮矣凡樂黃鍾為宮大呂為角太簇為徵應鍾為羽路鼓路鼗陰竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣八陳制兵八陳四為正四為竒餘竒為握竒或總稱之先出遊軍定兩端天有衡地有軸前後有衝風附于天雲附于地衡重列各四隊前後之衝各二隊風居四維故有圓軸單列各三隊前後之衝各三隊雲居四角故有方天居兩端地居中門總為八陳陳訖遊軍從後躡敵或驚其左或驚其右聼音望麾以出四竒天地之前衝為虎翼風為蛇蟠圍繞之義也虎居于中張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居于中張翼以進鳥掖兩端向敵而翔以應之虛實二壘皆逐天文氣候山川向背利害隨時而行以正合以竒勝黃帝立井田之法因以制兵以八為法八八六十四而軍制備矣用八而不用九所以藏其用也九刑禁姦九刑曰大辟曰宫曰剕曰劓曰墨曰流曰鞭曰朴曰贖九寸為律黃鍾長九寸空圍九分積八百一十分子一丑三寅九卯二十七辰八十一巳二百四十三午七百二十九未二千一百八十七申六千五百六十一酉一萬九千六百八十三戌五萬九千四十九亥一十七萬七千一百四十七蓋黃鍾九寸以三分為損益故以三歷十二辰得一十七萬七千一百四十七為黃鍾之實其十二辰所得之數在子寅辰午申戌六陽辰為黃鍾寸分釐毫絲之數在亥酉未己卯丑六陰辰為黃鍾寸分釐毫絲之法其寸分釐毫絲之法皆用九數九分造歷以律起歷故統元日法八十一蓋元始黃鍾初九自乘一籥之數得日法案九分造歷四字與下文九筮稽疑四字原本俱誤作小注謹校正九筮稽疑一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶九章命算一曰方田以御田疇界域二曰粟米以御交質變易三曰衰分以御貴賤廩稅四曰少廣以御積羃方圓五曰商功以御功程積實六曰均輸以御逺近勞費七曰盈朒以御隱雜互見八曰方程以御錯揉正負九曰勾股以御髙深廣逺九職任萬民一曰三農生九榖二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰閒民無常職轉移執事九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦九式節財用一曰祭祀之式二曰賔客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式九府立圜法大府玉府內府外府泉府天府職內職嵗職幣圜者謂均而通也九服辨邦國王畿之外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服九命位邦國一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯九儀命邦國上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就二車九乘介九人禮九牢其朝位賓主之間九十步立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人禮七牢朝位賓主之間七十步立當前疾擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其他皆如諸侯之禮諸子執榖圭五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人禮五牢朝位賔主之間五十步立當車衡擯者三人廟中將幣三享王禮一祼不酢饗禮五獻食禮五舉出入三積一問一勞諸男執蒲璧其他皆如諸子之禮九法平邦國制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以紏邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國九伐正邦國馮弱犯寡則眚之賊賢害民則伐之暴內陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弒其君則殘之犯令陵政則杜之外內亂鳥獸行則滅之九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰財貢六曰貨貢七曰服貢八曰斿貢九曰物貢營國九里制城九雉九階九室九經九緯匠人營國方九里旁三門國中九經九緯經涂九軌左祖右社面朝後市市朝一夫夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾忩白盛門堂三之二室三之一殷人重屋堂修七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂上度以筵宮中度以尋野度以步涂度以軌廟門容大扃七個闈門容小扄叄個路門不容乘車之五個應門二徹叄個內有九室九嬪居之外有九室九卿朝焉九分其國以為九分九卿治之王宮門阿之制五雉宮隅之制七雉城隅之制九雉經涂九軌環涂七軌野涂五軌門阿之制以為都城之制宮隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂數之度也孔子曰為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔遠人也懷諸侯也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔遠人則四方歸之懷諸侯則天下畏之齊明盛服非禮不動所以修身也去讒遠色賤貨而貴德所以勸賢也尊其位重其祿同其好惡所以勸親親也官盛任使所以勸大臣也忠信重祿所以勸士也時使薄斂所以勸百姓也日省月試既稟稱事所以勸百工也送往迎來嘉善而矜不能所以柔遠人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也凡為天下國家有九經所以行之者一也昔黃帝使伶倫自大夏之西崑崙之陰取竹之解谷生其竅厚均者斷兩節間而吹之以為黃鐘之宮制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六此黃鐘之宫而皆可以生之是為律本度其長以子榖秬黍中者九十枚度之一為一分十分為寸十寸為尺十尺為丈十丈為引審其容以千二百黍實之合籥為合十合為升十升為斗十斗為斛權其重百黍為一銖千二百黍為十二銖二十四銖為兩十六兩為斤三十斤為鈞四鈞為石書曰同律度量衡傳曰黃鐘為萬事根本也昔者聖人之原數也以决天下之疑以成天下之務以順性命之理析事辨物彰往察來是故天數五地數六五六者天地之中合也五為五行六為六氣陽性陰質五行之性曰木曰火曰土曰金曰水六氣之質曰胎曰生曰壯曰老曰死曰化木之質也曰楊栁曰梅李曰松柏曰竹葦曰禾麥曰菌火之質也曰木火曰石火曰雷火曰油火曰蟲火曰燐土之質也曰砂曰石曰玉曰土曰壤曰泥金之質也曰汞曰銀曰金曰銅曰鐡曰鉛水之質也曰澗水曰井水曰雨水曰溝渠曰陂澤曰湖海木之物也曰鯪鯉曰蛇曰龍曰鯉魴曰小魚曰鰍火之物也曰雞曰雉曰鳳曰鷹隼曰燕雀曰蠛蠓案篇首有五行動物屬圖火之物曰雁曰雞曰鳯鶴曰鷹隼曰燕雀曰梟蠛蠓與此小異土之物也曰蟾蜍曰蠶曰人曰蜘蛛曰蚓曰鰻金之物也曰鹿曰馬曰麟曰虎曰獺案獺篇首圖中作牛豕曰毛蟲水之物也曰蟹曰鱟曰龜曰蝦曰蚌曰蠣木之器也曰疏器門忩曰琴瑟曰規曰算篩曰耒耜曰網罟火之器也曰登器梯棚曰文書曰繩曰冠冕案篇首有五行用物屬圖作筆硯曰檯棹曰履踏土之器也曰腹器筐筥曰圭璧曰量曰舟車曰盤盂曰棺槨金之器也曰方器斧鉞曰印節曰矩曰弓矢曰簡册曰械校水之器也曰平器權衡曰輪磨曰凖曰鏡奩曰研椎曰厠圂逆順者事之幾也吉凶者事之著也順而吉者木為徵召為科名為恩赦為婚姻為産孕為財帛火為燕集為朝覲為文書案篇首有五行事類吉圖首燕集次文書次朝㑹與此小異為言語為歌舞為燈燭土為工役為循常為盟約為田宅為福夀為墳墓金為賜豫為按察為更革為軍旅為錢貨為刑法水為交易為遷移為征行為酒食為田獵為祭祀逆而凶者木為􅑾杌為驚憂為醜惡為壓墜為夭折為産死火為公訟為顚狂為口舌為炙灸為灾焚為震燬土為反覆為欺詐為離散為貧窮為疾病為死亡金為征役為罷免為責降為爭鬬為傷損為殺戮水為盜賊為囚獄為徒流為淫亂為呪咀為浸溺筮者神之所為乎其蓍五十虗一分二掛一以三揲之視左右手歸餘於扐兩竒為一初揲三一再揲三三兩耦為二初揲二二再揲四二竒耦為三初揲四三再揲二一初揲綱也再揲目也綱一函三以虗待目目一為一以實從綱兩揲而九數具八揲而六千五百六十一之數備矣案此書揲蓍之法與占易異明章氏懋發明之曰初揲之數為綱再揲之數為目若綱得一數而遇目之一則為一綱一而目二則為二綱一而目三則為三若綱二而遇目之一則為四綱二而目二則為五綱二而目三則又為六矣若綱三而遇目之一則為七綱三而目二為八綱三而目又三則成九數綱目相配所謂兩揲而九數具也若再加兩揲如前所占則得八十一數之一而大全矣于四揲之後又加四揲以求其小數而决吉凶如原之一一則為元吉所謂八揲而六千五百六十一之數備者也推闡最為詳明今附見分合變化如環無端天命人事由是較焉吉凶禍福由是彰焉大人得之而申福小人得之而避禍君子曰筮者神之所為乎大事用年其次用月其次用日其次用時十二木徑九分厚一分陽刻一陰刻二者四陽刻二陰刻三者四陽刻三陰刻一者四雜取其八自上而下自左而右縱二橫四縱者九也橫者一十百千也餘四不用者不用之用也前後相乘而數備矣之按章氏懋曰其用十二木者不過以記其揲蓍所得數非以木而占筮也所謂雜取其八者如揲得綱數之一二三則以陽刻之木記之揲得目數之一二三則以陰刻之木記之始焉初揲再揲則其綱與目合而得九數之一繼焉初揲再揲則其綱與目合又得九數之一而九九八十一之數具矣又曰以其一綱一目自上而下直而數之各有二木則為縱二以其四綱四目自左而右橫而布之各有四木則為橫四共成一圖今附録之以備考又案原注十二木以下云云圖解本作大字低格另行似更明晰今未敢輒改姑仍其舊數者理之時也辭者數之義也吉凶者辭之斷也惠迪從逆者吉凶之决也氣有醇漓故數有得失一成于數天地不能易之能易之者人也一吉而九凶三祥而七災八休而二咎四吝而六悔八數周流推類而求五中則平四害不親厥或是攖雜而不純承平之世視主廢置凶咎災悔有命不摯
